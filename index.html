<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <title>Secure Blockchain Vote</title>
    <style>
        body {
            background-image: url('vote.jpeg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .overlay-bg { background: rgba(165, 158, 158, 0.6); min-height: 100vh; padding-bottom: 50px; }
        
        /* Glassmorphism Effect for Boxes */
        .glass-card {
            background: rgba(16, 13, 13, 0.315);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(207, 177, 177, 0);
            border-radius: 24px;
        }

        .candidate-card {
            transition: transform 0.3s ease;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
        }
        .candidate-card:hover { transform: translateY(-10px); }

        #sidebar { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #sidebar.open { transform: translateX(0); }
        .page { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
        
        .box-img { width: 80px; height: 80px; margin: 0 auto 20px; }
        .chart-container { max-width: 450px; margin: 0 auto; height: 250px; }
    </style>
</head>

<body class="text-slate-900 font-sans">
    <div class="overlay-bg">

    <nav class="bg-black/90 text-white p-5 flex justify-between items-center sticky top-0 z-50 backdrop-blur-md">
        <h1 class="text-xl font-black italic">SECURE <span class="text-yellow-500">VOTE</span></h1>
        <div class="flex items-center gap-4">
            <button onclick="toggleLanguage()" id="lang-btn" class="text-[10px] font-bold border border-yellow-500 text-yellow-500 px-3 py-1 rounded">EN</button>
            <button onclick="toggleSidebar()" class="text-[10px] font-bold border border-white/30 px-4 py-2 rounded">MENU</button>
        </div>
    </nav>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 hidden z-40"></div>

    <div id="sidebar" class="fixed top-0 right-0 w-64 h-full bg-white z-50 p-6 shadow-2xl">
        <div class="flex flex-col gap-4 font-bold text-gray-800">
            <button onclick="goHome()" data-key="nav-home" class="text-left py-4 border-b">Home</button>
            <button onclick="adminAuth('cand-reg')" data-key="nav-nom" class="text-left py-4 border-b">Nomination</button>
            <button onclick="adminAuth('admin-page')" data-key="nav-res" class="text-left py-4 border-b">Live Results</button>
            <button onclick="logout()" data-key="nav-logout" class="text-left text-red-600 py-4">Logout</button>
        </div>
    </div>

    <section id="login-page" class="page max-w-md mx-auto mt-16 p-10 glass-card text-center shadow-2xl">
        <img src="https://cdn-icons-png.flaticon.com/512/4042/4042356.png" class="box-img" alt="Login Icon">
        <h2 data-key="login-title" class="text-2xl font-black mb-8 border-b-2 border-yellow-500 inline-block pb-1 italic">Voter Login</h2>
        <input type="text" id="l-user" data-placeholder="ph-user" placeholder="Username" class="w-full p-4 mb-4 bg-gray-100 rounded-xl outline-none border focus:border-yellow-500 transition">
        <input type="password" id="l-pass" data-placeholder="ph-pass" placeholder="Password" class="w-full p-4 mb-6 bg-gray-100 rounded-xl outline-none border focus:border-yellow-500 transition">
        <button onclick="handleLogin()" data-key="btn-login" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase text-xs hover:bg-yellow-500 transition shadow-lg">Login</button>
        <p class="mt-8 text-[10px] text-gray-500 font-bold uppercase"><span data-key="new-voter">New?</span> <a href="#" onclick="showPage('reg-page')" class="text-yellow-600 underline" data-key="reg-link">Register Here</a></p>
    </section>

    <section id="reg-page" class="page hidden max-w-md mx-auto mt-16 p-10 glass-card text-center shadow-2xl">
        <img src="https://cdn-icons-png.flaticon.com/512/3456/3456426.png" class="box-img" alt="Reg Icon">
        <h2 data-key="reg-title" class="text-2xl font-black mb-8 italic uppercase">Create Account</h2>
        <div class="space-y-4">
            <input type="text" id="r-user" data-placeholder="ph-user" placeholder="Username" class="w-full p-4 bg-gray-50 rounded-xl border outline-none focus:border-yellow-500">
            <input type="password" id="r-pass" data-placeholder="ph-pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-xl border outline-none focus:border-yellow-500">
            <input type="email" id="r-email" data-placeholder="ph-email" placeholder="Email Address" class="w-full p-4 bg-gray-50 rounded-xl border outline-none focus:border-yellow-500">
            <button onclick="getOTP()" data-key="btn-otp" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-bold uppercase text-xs shadow-md">Get OTP</button>
            <button onclick="showPage('login-page')" data-key="btn-back" class="w-full text-gray-400 font-bold text-[10px] py-2 uppercase">Back to Login</button>
        </div>
    </section>

    <section id="vote-page" class="page hidden max-w-6xl mx-auto mt-12 p-6 text-center">
        <h2 data-key="vote-title" class="text-3xl font-black mb-10 text-white italic uppercase border-b-4 border-yellow-500 inline-block">Cast Your Vote</h2>
        <div id="candidates-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <section id="cand-reg" class="page hidden max-w-md mx-auto mt-16 p-10 glass-card shadow-2xl">
        <img src="https://cdn-icons-png.flaticon.com/512/10443/10443153.png" class="box-img" alt="Nomination">
        <h2 data-key="nav-nom" class="text-2xl font-black mb-8 italic text-center uppercase">Nomination</h2>
        <div class="space-y-4">
            <input type="text" id="c-name" data-placeholder="ph-cand-name" placeholder="Candidate Name" class="w-full p-4 bg-gray-50 rounded-xl border outline-none">
            <input type="text" id="c-party" data-placeholder="ph-party" placeholder="Party Name" class="w-full p-4 bg-gray-50 rounded-xl border outline-none">
            <input type="text" id="c-logo" placeholder="Logo URL (Icon)" class="w-full p-4 bg-gray-50 rounded-xl border outline-none">
            <button onclick="handleNomination()" data-key="btn-reg-cand" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase text-xs">Submit</button>
        </div>
    </section>

    <section id="admin-page" class="page hidden max-w-4xl mx-auto mt-12 p-10 glass-card shadow-2xl">
        <h2 data-key="nav-res" class="text-2xl font-black mb-8 italic text-center uppercase">Election Results</h2>
        <div class="chart-container mb-10"><canvas id="voteChart"></canvas></div>
        <div id="results-area" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <button onclick="goHome()" data-key="btn-back" class="w-full mt-10 bg-gray-200 py-3 rounded-xl font-bold uppercase text-xs">Go Back</button>
    </section>

    </div>

    <script>
        const API="https://e-voting-blockchain-mlwh.onrender.com";
        const ADMIN_PASS="admin123";
        let generatedOTP="";
        let myChart = null;
        let currentLang = 'mr';

        const translations = {
            en: {
                'nav-home': 'Home', 'nav-nom': 'Nomination', 'nav-res': 'Live Results', 'nav-logout': 'Logout',
                'login-title': 'Voter Login', 'ph-user': 'Username', 'ph-pass': 'Password', 'btn-login': 'Login to System',
                'new-voter': 'New?', 'reg-link': 'Register Here', 'reg-title': 'Create Account', 'ph-email': 'Email Address',
                'btn-otp': 'Get OTP on Email', 'btn-back': 'Go Back', 'vote-title': 'Choose Your Leader',
                'btn-reg-cand': 'Register Candidate', 'ph-cand-name': 'Candidate Name', 'ph-party': 'Party Name', 'vote-btn': 'VOTE'
            },
            mr: {
                'nav-home': 'होम', 'nav-nom': 'उमेदवारी', 'nav-res': 'निकाल', 'nav-logout': 'लॉगआउट',
                'login-title': 'मतदार लॉगिन', 'ph-user': 'युजरनेम', 'ph-pass': 'पासवर्ड', 'btn-login': 'लॉगिन करा',
                'new-voter': 'नवीन?', 'reg-link': 'नोंदणी करा', 'reg-title': 'खाते तयार करा', 'ph-email': 'ईमेल पत्ता',
                'btn-otp': 'ईमेलवर OTP मिळवा', 'btn-back': 'मागे जा', 'vote-title': 'तुमचे मत द्या',
                'btn-reg-cand': 'उमेदवार नोंदवा', 'ph-cand-name': 'उमेदवाराचे नाव', 'ph-party': 'पक्षाचे नाव', 'vote-btn': 'मतदान'
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'mr' ? 'en' : 'mr';
            document.getElementById('lang-btn').innerText = currentLang === 'mr' ? 'EN' : 'MR';
            document.querySelectorAll('[data-key]').forEach(el => el.innerText = translations[currentLang][el.getAttribute('data-key')]);
            document.querySelectorAll('[data-placeholder]').forEach(el => el.placeholder = translations[currentLang][el.getAttribute('data-placeholder')]);
            if(!document.getElementById('vote-page').classList.contains('hidden')) loadData();
        }

        (function(){ emailjs.init("T1-bV4G_xfW_Puw8K"); })();
        function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('hidden'); }
        function showPage(id){ document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goHome(){ showPage('login-page'); if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar(); }

        async function getOTP(){
            const email=document.getElementById('r-email').value;
            if(!email.includes("@")){ Swal.fire({icon:'warning', title:'Invalid Email', text:'Please enter a valid email address.'}); return; }
            generatedOTP = Math.floor(100000 + Math.random()*900000);
            emailjs.send("service_bqh83ye","template_jfug8we",{ to_email:email, otp_code:generatedOTP });
            const { value: otp } = await Swal.fire({ 
                title: 'OTP Verification', 
                input: 'text', 
                text: 'Check your email for the code',
                inputAttributes: { maxlength: 6 },
                confirmButtonColor: '#EAB308'
            });
            if(otp == generatedOTP){ handleReg(); } else if(otp) { Swal.fire({icon:'error', title:'Wrong OTP'}); }
        }

        async function handleReg(){
            const u=document.getElementById('r-user').value;
            const p=document.getElementById('r-pass').value;
            const em=document.getElementById('r-email').value;
            const res=await fetch(`${API}/register_voter`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p,phone:em}) });
            if(res.ok){ Swal.fire({icon:'success', title:'Success', text:'Account created successfully!'}).then(()=>showPage('login-page')); }
            else { Swal.fire({icon:'error', title:'Error', text:'User already exists.'}); }
        }

        // १. लॉगिन सक्सेस पॉपअप अपडेट
        async function handleLogin(){
            const u=document.getElementById('l-user').value;
            const p=document.getElementById('l-pass').value;
            try {
                const res=await fetch(`${API}/login_voter`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) });
                const data=await res.json();
                if(res.ok){ 
                    localStorage.setItem("user",u); 
                    localStorage.setItem("phone",data.phone); 
                    
                    // Attractive Success Popup
                    Swal.fire({
                        title: 'Welcome! | स्वागत आहे!',
                        text: 'Login Successful. | लॉगिन यशस्वी झाले.',
                        imageUrl: 'https://cdn-icons-png.flaticon.com/512/190/190411.png',
                        imageWidth: 80,
                        timer: 2000,
                        showConfirmButton: false,
                        backdrop: `rgba(0,0,123,0.4)`
                    });

                    showPage('vote-page'); loadData(); 
                } else { 
                    Swal.fire({
                        icon: 'error',
                        title: 'Login Failed! | लॉगिन अयशस्वी!',
                        text: 'Check credentials. | माहिती तपासा.',
                        confirmButtonColor: '#000'
                    }); 
                }
            } catch(e) { 
                Swal.fire({icon:'error', title:'Backend Offline', text:'सर्व्हरशी संपर्क होऊ शकला नाही.'}); 
            }
        }

        // २. मतदान (Voting) पॉपअप अपडेट
        async function vote(id, name) {
            const phone = localStorage.getItem("phone");
            const conf = await Swal.fire({ 
                title: 'Confirm Your Vote | मतदानाची खात्री करा', 
                html: `Are you sure you want to vote for <b>${name}</b>?<br>तुम्ही नक्की <b>${name}</b> यांना मतदान करू इच्छिता का?`,
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/2633/2633813.png',
                imageWidth: 100,
                showCancelButton: true,
                confirmButtonText: 'Yes, Vote! | हो, मतदान करा!',
                cancelButtonText: 'Cancel | रद्द करा',
                confirmButtonColor: '#EAB308',
                cancelButtonColor: '#000',
                reverseButtons: true
            });
            
            if(conf.isConfirmed) {
                const res = await fetch(`${API}/cast_vote`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id, phone: phone}) });
                if(res.ok) { 
                    Swal.fire({
                        icon: 'success',
                        title: 'Vote Recorded! | मतदान नोंदवले गेले!',
                        text: 'Your vote is secured on the blockchain. | तुमचे मत ब्लॉकचेनवर सुरक्षित केले आहे.',
                        imageUrl: 'https://cdn-icons-png.flaticon.com/512/4436/4436481.png',
                        imageWidth: 80,
                        confirmButtonColor: '#000'
                    }); 
                    loadData(); 
                } else { 
                    const d = await res.json(); 
                    Swal.fire({
                        icon: 'warning',
                        title: 'Already Voted! | आधीच मतदान केले आहे!',
                        text: 'You can only vote once. | तुम्ही फक्त एकदाच मतदान करू शकता.',
                        confirmButtonColor: '#000'
                    }); 
                }
            }
        }

        // ३. रजिस्ट्रेशन सक्सेस पॉपअप
        async function handleReg(){
            const u=document.getElementById('r-user').value;
            const p=document.getElementById('r-pass').value;
            const em=document.getElementById('r-email').value;
            const res=await fetch(`${API}/register_voter`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p,phone:em}) });
            if(res.ok){ 
                Swal.fire({
                    icon: 'success',
                    title: 'Registration Done! | नोंदणी पूर्ण झाली!',
                    text: 'Now you can login. | आता तुम्ही लॉगिन करू शकता.',
                    confirmButtonColor: '#EAB308'
                }).then(()=>showPage('login-page')); 
            } else { 
                Swal.fire({icon:'error', title:'Error | त्रुटी', text:'User already exists. | युजर आधीच अस्तित्वात आहे.'}); 
            }
        }

        async function loadData() {
            const res = await fetch(`${API}/get_data`);
            const data = await res.json();
            const btnT = translations[currentLang]['vote-btn'];
            
            document.getElementById('candidates-grid').innerHTML = data.candidates.map(c => `
                <div class="candidate-card p-8 rounded-[32px] border shadow-xl text-center relative overflow-hidden bg-white">
                    <div class="absolute top-0 left-0 w-full h-2 bg-yellow-500"></div>
                    <img src="${c.logo || 'https://cdn-icons-png.flaticon.com/512/10443/10443153.png'}" class="w-20 h-20 mx-auto rounded-full border-4 border-gray-100 mb-4 object-cover">
                    <h3 class="font-black text-xl uppercase tracking-tight">${c.name}</h3>
                    <p class="text-xs text-gray-400 font-bold mb-6">${c.party}</p>
                    <button onclick="vote(${c.id}, '${c.name}')" class="w-full bg-black text-white py-4 rounded-2xl font-black hover:bg-yellow-500 hover:text-black transition-all shadow-lg text-sm">${btnT}</button>
                </div>
            `).join('');

            document.getElementById('results-area').innerHTML = data.candidates.map(c => `
                <div class="bg-white/50 p-4 rounded-xl border flex justify-between items-center shadow-sm">
                    <span class="font-bold uppercase text-[10px]">${c.name}</span>
                    <span class="bg-black text-white px-3 py-1 rounded-full text-[10px] font-black">${c.votes}</span>
                </div>
            `).join('');
            updateGraph(data.candidates);
        }

        function updateGraph(candidates) {
            const ctx = document.getElementById('voteChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: candidates.map(c => c.name),
                    datasets: [{
                        data: candidates.map(c => c.votes),
                        backgroundColor: ['#000', '#EAB308', '#3B82F6', '#EF4444'],
                        borderRadius: 10
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function vote(id, name) {
            const phone = localStorage.getItem("phone");
            const conf = await Swal.fire({ 
                title: 'Confirm Vote', 
                text: `Are you sure you want to vote for ${name}?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#000'
            });
            if(conf.isConfirmed) {
                const res = await fetch(`${API}/cast_vote`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id, phone: phone}) });
                if(res.ok) { Swal.fire({icon:'success', title:'Vote Recorded!', text:'Your vote is secured on the blockchain.'}); loadData(); }
                else { const d = await res.json(); Swal.fire({icon:'warning', title:'Oops!', text: d.error}); }
            }
        }

        async function adminAuth(page) {
            const { value: pw } = await Swal.fire({ title: 'Admin Required', input: 'password', confirmButtonColor: '#000' });
            if(pw === ADMIN_PASS) { showPage(page); loadData(); toggleSidebar(); }
            else if(pw) { Swal.fire({icon:'error', title:'Access Denied'}); }
        }

        async function handleNomination() {
            const n = document.getElementById('c-name').value;
            const p = document.getElementById('c-party').value;
            const l = document.getElementById('c-logo').value;
            await fetch(`${API}/register_candidate`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name:n, party:p, logo:l}) });
            Swal.fire({icon:'success', title:'Nominated!'}).then(() => goHome());
        }

        function logout(){ localStorage.clear(); location.reload(); }
        showPage('login-page');
    </script>
</body>
</html>
